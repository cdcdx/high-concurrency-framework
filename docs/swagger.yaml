basePath: /
definitions:
  github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      trace_id:
        type: string
    type: object
  github_com_cdcdx_high-concurrency-framework_internal_model.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  github_com_cdcdx_high-concurrency-framework_internal_model.Order:
    properties:
      amount:
        type: number
      created_at:
        type: string
      id:
        type: integer
      order_no:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        minimum: 1
        type: integer
    required:
    - user_id
    type: object
  github_com_cdcdx_high-concurrency-framework_internal_model.RegisterRequest:
    properties:
      email:
        maxLength: 128
        type: string
      password:
        maxLength: 128
        minLength: 6
        type: string
      phone:
        maxLength: 20
        type: string
      username:
        maxLength: 64
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  github_com_cdcdx_high-concurrency-framework_internal_model.TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        description: 秒
        type: integer
      token_type:
        description: '"Bearer"'
        type: string
      user_id:
        type: integer
      username:
        type: string
    type: object
  github_com_cdcdx_high-concurrency-framework_internal_model.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      last_login_at:
        type: string
      phone:
        type: string
      status:
        description: 1=正常 0=禁用
        type: integer
      updated_at:
        type: string
      username:
        type: string
    type: object
  github_com_cdcdx_high-concurrency-framework_internal_model.UserProfile:
    properties:
      avatar:
        type: string
      bio:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      nickname:
        type: string
      phone:
        type: string
      tags:
        items:
          type: string
        type: array
      updated_at:
        type: string
      user_id:
        type: integer
    required:
    - user_id
    type: object
host: localhost:8080
info:
  contact:
    name: cdcdx
  description: 高并发业务处理框架，支持多级缓存、读写分离、异步消息、全文搜索等能力
  title: 高并发业务框架 API
  version: 1.0.0
paths:
  /api/v1/analytics/behaviors:
    get:
      description: 查询用户行为事件汇总数据
      parameters:
      - description: 事件类型(如order_create)
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      security:
      - Bearer: []
      summary: 行为摘要
      tags:
      - 分析
  /api/v1/analytics/daily:
    get:
      description: 查询PostgreSQL中的每日统计数据，支持日期范围筛选
      parameters:
      - default: __7DAYS_AGO__
        description: 起始日期(YYYY-MM-DD)
        in: query
        name: from
        type: string
      - default: __TODAY__
        description: 结束日期(YYYY-MM-DD)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      security:
      - Bearer: []
      summary: 每日统计
      tags:
      - 分析
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 验证用户名密码并返回JWT令牌
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.TokenResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      summary: 用户登录
      tags:
      - 认证
  /api/v1/auth/me:
    get:
      description: 根据JWT令牌返回当前登录用户信息 (需Authorization头)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.User'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      security:
      - Bearer: []
      summary: 获取当前用户信息
      tags:
      - 认证
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: 创建新用户账号并返回JWT令牌
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.TokenResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      summary: 用户注册
      tags:
      - 认证
  /api/v1/monitor/cache-stats:
    get:
      description: 返回L1本地缓存命中率和多级缓存统计信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      summary: 缓存统计
      tags:
      - 监控
  /api/v1/monitor/circuit-breaker:
    get:
      description: 查看当前熔断器状态(CLOSED/OPEN/HALF_OPEN)及详细指标
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      summary: 熔断器状态
      tags:
      - 监控
  /api/v1/monitor/metrics:
    get:
      description: 获取缓存命中率、QPS、熔断器状态等实时运行指标
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      summary: 服务指标
      tags:
      - 监控
  /api/v1/orders:
    post:
      consumes:
      - application/json
      description: 双通道分流：同步(限流内) | 异步(超限→Kafka)，适用于高并发写场景
      parameters:
      - description: 订单信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.Order'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
            - properties:
                data:
                  properties:
                    channel:
                      type: string
                    order_no:
                      type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      security:
      - Bearer: []
      summary: 创建订单 (异步)
      tags:
      - 订单
  /api/v1/orders/{orderNo}:
    get:
      description: 通过订单号查询，走L1→L2→MySQL三级缓存
      parameters:
      - description: 订单号
        in: path
        name: orderNo
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.Order'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      security:
      - Bearer: []
      summary: 查询订单
      tags:
      - 订单
  /api/v1/orders/search:
    get:
      description: 通过Elasticsearch全文搜索订单
      parameters:
      - description: 搜索关键词
        in: query
        name: q
        required: true
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      security:
      - Bearer: []
      summary: 搜索订单
      tags:
      - 订单
  /api/v1/orders/sync:
    post:
      consumes:
      - application/json
      description: 强制同步写入MySQL，不走Kafka，立即可读
      parameters:
      - description: 订单信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.Order'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
            - properties:
                data:
                  properties:
                    channel:
                      type: string
                    order_no:
                      type: string
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      security:
      - Bearer: []
      summary: 创建订单 (同步)
      tags:
      - 订单
  /api/v1/users/{userID}/profile:
    get:
      description: '走多级缓存: L1→L2→L3(MongoDB)'
      parameters:
      - description: 用户ID
        in: path
        name: userID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.UserProfile'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      security:
      - Bearer: []
      summary: 查询用户资料
      tags:
      - 用户
  /api/v1/users/profile:
    post:
      consumes:
      - application/json
      description: MongoDB upsert 写入，同时更新缓存
      parameters:
      - description: 用户资料
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.UserProfile'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.UserProfile'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      security:
      - Bearer: []
      summary: 创建/更新用户资料
      tags:
      - 用户
  /api/v1/users/search:
    get:
      description: 通过Elasticsearch全文搜索用户
      parameters:
      - description: 搜索关键词
        in: query
        name: q
        required: true
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_cdcdx_high-concurrency-framework_internal_model.ApiResponse'
      security:
      - Bearer: []
      summary: 搜索用户
      tags:
      - 用户
securityDefinitions:
  Bearer:
    description: 输入JWT令牌 (可带或不带 "Bearer " 前缀), 通过 POST /api/v1/auth/login 或 /api/v1/auth/register
      获取
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
